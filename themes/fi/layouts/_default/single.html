{{ define "main" }}
<article class="prose">
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
      {{ with .Params.tags }}
      <span class="tags">·
        {{ range $i, $t := . }}{{ if $i }}, {{ end }}<a href="{{ "/tags/" | relURL }}{{ $t | urlize }}/">{{ $t }}</a>{{ end }}
      </span>
      {{ end }}
    </div>
  </header>

  {{ if .Params.toc }}
  <div class="toc">
    <p>Contents</p>
    {{ .TableOfContents }}
  </div>
  {{ end }}

  {{ .Content }}
</article>
{{ end }}
